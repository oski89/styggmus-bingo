<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stygg Mus Bingo</title>
    <meta
      name="description"
      content="Mobilvänlig bingoapp för Stygg Mus-helgen med unika brickor, ljud, animationer och priser."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <section id="access-screen" class="access-screen" aria-live="polite">
      <div class="access-panel">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 96 96" focusable="false">
            <path class="mark-shadow" d="M48 7 81 20v27c0 22-13 35-33 42C28 82 15 69 15 47V20L48 7Z" />
            <path class="mark-plate" d="M48 11 76 22v24c0 19-11 31-28 37-17-6-28-18-28-37V22L48 11Z" />
            <path class="mark-line" d="M31 30h34M28 62h40" />
            <text x="48" y="57" text-anchor="middle">SM</text>
          </svg>
        </div>
        <h1>Stygg Mus Bingo</h1>

        <form id="password-form" class="password-form">
          <label for="password-input">Lösenord</label>
          <div class="password-row">
            <input
              id="password-input"
              type="password"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
            />
            <button class="primary-btn" type="submit">Öppna</button>
          </div>
          <p id="password-feedback" class="feedback" role="alert"></p>
        </form>

        <div id="player-select" class="player-select hidden">
          <h2>Vem är du?</h2>
          <div class="player-buttons" aria-label="Välj spelare">
            <button type="button" data-player-id="stygg-mus-president">Stygg mus president</button>
            <button type="button" data-player-id="mouse-trap-pukie">Mouse trap pukie</button>
            <button type="button" data-player-id="pommesansvarig">Pommesansvarig</button>
            <button type="button" data-player-id="afc-master">AFC master</button>
            <button type="button" data-player-id="prospect">Prospect</button>
          </div>
          <button id="reset-all-btn" class="reset-all-btn" type="button">Nollställ allt</button>
        </div>
        <p class="version-line">Stygg Mus 2026</p>
      </div>
    </section>

    <main id="app" class="app hidden">
      <header class="hero">
        <div class="brand-mark hero-mark" aria-hidden="true">
          <svg viewBox="0 0 96 96" focusable="false">
            <path class="mark-shadow" d="M48 7 81 20v27c0 22-13 35-33 42C28 82 15 69 15 47V20L48 7Z" />
            <path class="mark-plate" d="M48 11 76 22v24c0 19-11 31-28 37-17-6-28-18-28-37V22L48 11Z" />
            <path class="mark-line" d="M31 30h34M28 62h40" />
            <text x="48" y="57" text-anchor="middle">SM</text>
          </svg>
        </div>
        <p class="tag">Sommartraditionen</p>
        <h1 id="game-title">Stygg Mus Bingo</h1>
        <p class="subtitle">Helgens officiella stygghetsprotokoll.</p>
      </header>

      <section class="controls" aria-label="Kontroller">
        <button id="new-board-btn" class="primary-btn" type="button">Ny bricka</button>
        <button id="reset-board-btn" class="secondary-btn" type="button">Nollställ bricka</button>
        <button id="change-player-btn" class="secondary-btn" type="button">Byt spelare</button>
      </section>

      <section class="stats" aria-live="polite">
        <div class="stat">
          <span class="stat-label">Spelare</span>
          <span id="current-player" class="stat-value">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Markerade</span>
          <span id="marked-count" class="stat-value">0/25</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bingorader</span>
          <span id="bingo-count" class="stat-value">0</span>
        </div>
      </section>

      <section class="board-wrap" aria-label="Bingobricka">
        <div id="board" class="board" role="grid" aria-label="Bingobricka 5 gånger 5"></div>
      </section>

      <p class="version-line">Stygg Mus 2026</p>
    </main>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-live="assertive">
      <div class="overlay-card">
        <h2 id="overlay-title">BINGO!</h2>
        <p id="overlay-text"></p>
        <button id="close-overlay-btn" type="button">Fortsätt spela</button>
      </div>
    </div>

    <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>
    <script src="./script.js"></script>
  </body>
</html>
